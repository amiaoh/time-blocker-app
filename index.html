<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Viewport: cover handles notches + Android nav bar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Time Blocker" />
    <meta name="theme-color" content="#0F0F0F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0F0F0F" />

    <!-- iOS (Safari fallback) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Time Blocker" />

    <meta name="description" content="Timeboxing app to help you focus and finish your day" />
    <title>Time Blocker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      @keyframes task-complete { 0% { filter: brightness(1.5); } 100% { filter: brightness(1); } }
      .task-card-completing { animation: task-complete 0.45s ease-out; }
      *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: #0a0a0a;
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
